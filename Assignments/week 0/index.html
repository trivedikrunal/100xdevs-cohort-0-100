<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Portfolio Returns Calculator</title>
</head>
<body>
    <div class="container">
        <h1>Portfolio Returns Calculator</h1>
        <label for="capital">Capital (₹):</label>
        <input type="number" id="capital" placeholder="Enter your capital" required>

        <label for="years">Years:</label>
        <input type="number" id="years" placeholder="Enter number of years" required>

        <label for="interest">Interest Rate (%):</label>ee
        <input type="number" id="interest" placeholder="Enter interest rate" required>

        <button id="calculateBtn">Calculate</button>

        <div id="output" class="output"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
